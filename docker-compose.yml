services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true" # Явно разрешаем создавать топики на лету
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Настраиваем так, чтобы и внутри докера, и снаружи (через localhost) Кафка была доступна
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  ml-service:
    build:
      context: ./ml-service
    ports:
      - "50051:50051"
    restart: always

  gateway:
    build:
      context: .
    depends_on:
      - kafka
      - ml-service
    # Мы используем host mode, чтобы Go видел сетевые пакеты твоего компа
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      # Так как gateway в режиме host, для него "localhost" — это твой реальный комп.
      # А так как мы пробросили порты 50051 и 9092 на комп, он их увидит.
      - CLASSIFIER_ADDR=localhost:50051
      - KAFKA_BROKERS=localhost:9092

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      "
      # Ждем, пока Кафка будет готова принимать команды
      kafka-topics --bootstrap-server kafka:29092 --list
      
      echo 'Creating kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic suspicious-flows --replication-factor 1 --partitions 1
      
      echo 'Successfully created topics'
      "